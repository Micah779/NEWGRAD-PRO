name: Weekly Live Adapter Smoke

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  live-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:live
        env:
          RUN_LIVE_TESTS: "true"
